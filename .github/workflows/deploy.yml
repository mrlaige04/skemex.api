name: Deploy API

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  COMPOSE_FILE: docker-compose.yaml
  COMPOSE_PROJECT_NAME: skemex-api
  DOCKER_NETWORK: skemex-network

jobs:
  deploy:
    runs-on: self-hosted
    env:
      POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
      MINIO_ROOT_USER: ${{ secrets.MINIO_ROOT_USER }}
      MINIO_ROOT_PASSWORD: ${{ secrets.MINIO_ROOT_PASSWORD }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      SUPERADMIN_EMAIL: ${{ secrets.SUPERADMIN_EMAIL }}
      SUPERADMIN_PASSWORD: ${{ secrets.SUPERADMIN_PASSWORD }}
      CORS_ALLOWED_ORIGINS: ${{ secrets.CORS_ALLOWED_ORIGINS }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate secrets
        run: |
          : "${POSTGRES_USER:?Set repository secret POSTGRES_USER}"
          : "${POSTGRES_PASSWORD:?Set repository secret POSTGRES_PASSWORD}"
          : "${POSTGRES_DB:?Set repository secret POSTGRES_DB}"
          : "${MINIO_ROOT_USER:?Set repository secret MINIO_ROOT_USER}"
          : "${MINIO_ROOT_PASSWORD:?Set repository secret MINIO_ROOT_PASSWORD}"
          : "${JWT_SECRET:?Set repository secret JWT_SECRET}"
          : "${SUPERADMIN_EMAIL:?Set repository secret SUPERADMIN_EMAIL}"
          : "${SUPERADMIN_PASSWORD:?Set repository secret SUPERADMIN_PASSWORD}"
          : "${CORS_ALLOWED_ORIGINS:?Set repository secret CORS_ALLOWED_ORIGINS (UI origin(s), comma-separated)}"

      - name: Ensure Docker network exists
        run: |
          docker network inspect "${DOCKER_NETWORK}" >/dev/null 2>&1 \
            || docker network create "${DOCKER_NETWORK}"

      - name: Build Docker images
        run: docker compose -f "${COMPOSE_FILE}" -p "${COMPOSE_PROJECT_NAME}" build

      - name: Stop existing stack
        run: docker compose -f "${COMPOSE_FILE}" -p "${COMPOSE_PROJECT_NAME}" down --remove-orphans

      - name: Start stack
        run: docker compose -f "${COMPOSE_FILE}" -p "${COMPOSE_PROJECT_NAME}" up -d

      - name: Show running services
        run: docker compose -f "${COMPOSE_FILE}" -p "${COMPOSE_PROJECT_NAME}" ps -a

      - name: Show API logs on failure
        if: failure()
        run: docker compose -f "${COMPOSE_FILE}" -p "${COMPOSE_PROJECT_NAME}" logs --no-color api
