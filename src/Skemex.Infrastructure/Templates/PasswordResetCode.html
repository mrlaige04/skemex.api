<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password reset</title>
</head>
<body style="margin: 0; padding: 0; background-color: #f4f4f5; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; color: #18181b; line-height: 1.6;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background-color: #f4f4f5; padding: 32px 16px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width: 560px; background-color: #ffffff; border-radius: 8px; padding: 32px;">
          <tr>
            <td>
              <p style="margin: 0 0 16px;">Hi {{Name}},</p>
              <p style="margin: 0 0 16px;">Use this code to reset your Skemex password:</p>
              <p style="margin: 0 0 24px; font-size: 24px; font-weight: 600; letter-spacing: 0.2em;">{{Code}}</p>
              <p style="margin: 0 0 16px;">This code expires in {{ExpiryMinutes}} minutes.</p>
              <p style="margin: 0 0 16px;">If you did not request a password reset, you can ignore this email.</p>
              <p style="margin: 0; color: #71717a;">— The Skemex team</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
